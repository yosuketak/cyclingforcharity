  <title>ページが見つかりません | Cycling for Charity Japan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #f8f9f8; color: #1a1a1a; min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* NAV */
    nav {
      background: rgba(255,255,255,0.96); border-bottom: 1px solid #e0e0e0;
      padding: 0 28px; display: flex; align-items: center;
      justify-content: space-between; height: 64px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 800; font-size: 16px; color: #2E7D32; text-decoration: none;
    }
    .nav-logo .logo-icon {
      width: 38px; height: 38px; background: #2E7D32;
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }

    /* MAIN */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 24px;
    }
    .card {
      background: white; border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      padding: 56px 48px; text-align: center; max-width: 520px; width: 100%;
    }
    .icon { font-size: 72px; margin-bottom: 24px; }
    .code {
      font-size: 13px; font-weight: 700; letter-spacing: 2px;
      color: #2E7D32; background: #E8F5E9; padding: 4px 14px;
      border-radius: 20px; display: inline-block; margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(22px, 4vw, 30px); font-weight: 900;
      margin-bottom: 10px; line-height: 1.3;
    }
    .sub {
      font-size: 15px; color: #666; line-height: 1.7; margin-bottom: 36px;
    }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      background: #2E7D32; color: white; padding: 14px 32px;
      border-radius: 12px; font-weight: 700; font-size: 15px;
      text-decoration: none; transition: transform 0.2s;
      box-shadow: 0 4px 14px rgba(46,125,50,0.3);
    }
    .btn-home:hover { transform: translateY(-2px); }
    .links {
      margin-top: 32px; display: flex; gap: 20px;
      justify-content: center; flex-wrap: wrap; font-size: 14px;
    }
    .links a { color: #2E7D32; text-decoration: none; }
    .links a:hover { text-decoration: underline; }

    /* FOOTER */
    footer {
      text-align: center; padding: 24px; font-size: 13px; color: #999;
    }
  </style>

<nav>
  <a class="nav-logo" href="index.html">

    <span>Cycling for Charity</span>
  </a>

<main>
  <div class="card">
    <div class="icon">🚴</div>
    <div class="code">404</div>
    <h1>
      <span>ページが見つかりません</span><br/>
      <span style="font-size:0.75em; color:#666;">Page Not Found</span>
    </h1>
    <p class="sub">
      お探しのページは移動または削除された可能性があります。<br/>
      <span style="color:#999; font-size:13px;">The page you're looking for may have moved or no longer exists. Our website was recently redesigned.</span>
    </p>
    <a class="btn-home" href="index.html">🏠 ホームへ戻る / Back to Home</a>
    <div class="links">
      <a href="about.html">About</a>
      <a href="get-involved.html">参加する</a>
      <a href="donate.html">寄付する</a>
      <a href="meet-the-team.html">Team</a>
    </div>
  </div>
</main>

<footer>
  &copy; 2025 NPO Cycling for Charity Japan
</footer>
